name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: [self-hosted, linux, nixos]
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review the PR diff for this pull request. Focus on:
            - Bugs, logic errors, and security issues
            - Performance problems
            - Code style and readability concerns

            Post your review using `gh pr review` with inline comments for specific issues.
            Use --comment for general feedback, --request-changes for bugs/security issues.
            If the code looks good, approve with --approve and a brief summary.
          claude_args: '--allowedTools Bash(gh pr review:*) Bash(gh pr diff:*) Bash(gh api:*)'
